<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>MirrorTrap — Live Attacker Dashboard</title>
<meta name="description" content="MirrorTrap honeypot real-time attacker intelligence dashboard"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080b11;--surface:#0d1117;--surface-2:#111720;--surface-3:#161d2a;
  --border:#1a2236;--border-hi:#243050;
  --accent:#00f5c4;--accent-dim:rgba(0,245,196,.10);--accent-glow:rgba(0,245,196,.25);--accent-mid:#00c99e;
  --red:#ff4d6d;--red-dim:rgba(255,77,109,.15);--orange:#ff8c42;--orange-dim:rgba(255,140,66,.15);
  --yellow:#ffd166;--yellow-dim:rgba(255,209,102,.15);--purple:#a78bfa;--purple-dim:rgba(167,139,250,.15);
  --blue:#60a5fa;--blue-dim:rgba(96,165,250,.12);
  --text:#e2eaf8;--text-dim:#6b7fa8;--text-muted:#3d4f6e;
  --mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif;
  --r:10px;--r-sm:6px;--r-lg:14px;
}
html,body,#app{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;line-height:1.5;
  background-image:linear-gradient(rgba(0,245,196,.025)1px,transparent 1px),linear-gradient(90deg,rgba(0,245,196,.025)1px,transparent 1px);
  background-size:40px 40px;}
button{cursor:pointer;font-family:var(--sans);border:none;background:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}

/* LAYOUT */
#app{display:grid;grid-template-rows:58px 48px 1fr;overflow:hidden}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 24px;
  border-bottom:1px solid var(--border);background:linear-gradient(180deg,var(--surface-2),var(--surface));
  position:relative;z-index:10;}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--accent-glow),transparent)}
.tl{display:flex;align-items:center;gap:20px}
.logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:17px;letter-spacing:-.02em}
.logo-icon{width:32px;height:32px;border-radius:8px;
  background:linear-gradient(135deg,var(--accent),var(--accent-mid));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 16px var(--accent-glow);}
.logo-icon svg{width:16px;height:16px;fill:#080b11}
.live-badge{display:flex;align-items:center;gap:6px;font-size:10px;font-weight:600;letter-spacing:.08em;
  text-transform:uppercase;color:var(--accent);background:var(--accent-dim);
  border:1px solid rgba(0,245,196,.2);border-radius:20px;padding:3px 10px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--accent);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.tr{display:flex;align-items:center;gap:20px}
.ts{display:flex;flex-direction:column;align-items:flex-end}
.ts-label{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted)}
.ts-val{font-size:14px;font-weight:700;color:var(--accent);font-family:var(--mono);line-height:1.2}
.tdiv{width:1px;height:28px;background:var(--border)}
.gh-btn{display:flex;align-items:center;gap:7px;padding:7px 14px;border-radius:var(--r-sm);
  border:1px solid var(--border-hi);color:var(--text-dim);font-size:12px;font-weight:600;transition:all .15s}
.gh-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}

/* STATS BAR */
.stats-bar{display:grid;grid-template-columns:repeat(5,1fr);border-bottom:1px solid var(--border);background:var(--surface)}
.stat-card{display:flex;align-items:center;gap:10px;padding:0 20px;border-right:1px solid var(--border)}
.stat-card:last-child{border-right:none}
.si{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.si.t{background:var(--accent-dim)}.si.r{background:var(--red-dim)}.si.y{background:var(--yellow-dim)}.si.p{background:var(--purple-dim)}.si.b{background:var(--blue-dim)}
.si svg{width:13px;height:13px}
.sinfo{display:flex;flex-direction:column}
.slabel{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);margin-bottom:2px}
.snum{font-size:18px;font-weight:700;font-family:var(--mono);line-height:1}
.snum.t{color:var(--accent)}.snum.r{color:var(--red)}.snum.y{color:var(--yellow)}.snum.p{color:var(--purple)}.snum.b{color:var(--blue)}
.snum.small{font-size:11px;line-height:1.3;margin-top:2px}

/* MAIN */
.main{display:grid;grid-template-columns:300px 1fr;overflow:hidden;background:var(--border);gap:1px}
.sidebar{background:var(--surface);display:flex;flex-direction:column;overflow:hidden}
.content{display:grid;grid-template-columns:1fr 340px;grid-template-rows:1fr 210px;gap:1px;background:var(--border);overflow:hidden}

/* PANEL */
.panel{background:var(--surface);overflow:hidden;display:flex;flex-direction:column}
.ph{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;
  border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface-2)}
.pt{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text-dim);display:flex;align-items:center;gap:7px}
.pt svg{width:13px;height:13px}
.badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;background:var(--accent-dim);color:var(--accent);border:1px solid rgba(0,245,196,.15)}
.pb{flex:1;overflow-y:auto;padding:0}

/* SEARCH */
.sw{padding:10px 12px;border-bottom:1px solid var(--border);flex-shrink:0;position:relative}
.sw input{width:100%;background:var(--surface-3);border:1px solid var(--border-hi);border-radius:var(--r-sm);
  padding:6px 10px 6px 30px;color:var(--text);font-size:12px;outline:none;font-family:var(--sans);transition:border-color .15s}
.sw input:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-dim)}
.sw input::placeholder{color:var(--text-muted)}
.si-search{position:absolute;left:21px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none}
.si-search svg{width:12px;height:12px}

/* ATTACKER LIST */
.alist{list-style:none;padding:6px}
.aitem{display:flex;align-items:center;gap:10px;padding:10px;border-radius:var(--r);cursor:pointer;
  transition:all .15s;margin-bottom:2px;border:1px solid transparent}
.aitem:hover{background:var(--surface-2);border-color:var(--border-hi)}
.aitem.active{background:rgba(0,245,196,.06);border-color:rgba(0,245,196,.25);box-shadow:0 0 12px rgba(0,245,196,.05)}
.aavatar{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.aavatar svg{width:14px;height:14px}
.av-crit{background:var(--red-dim);border:1px solid rgba(255,77,109,.35);color:var(--red)}
.av-med{background:var(--yellow-dim);border:1px solid rgba(255,209,102,.25);color:var(--yellow)}
.av-low{background:var(--accent-dim);border:1px solid rgba(0,245,196,.2);color:var(--accent)}
.aitem.active .aavatar{box-shadow:0 0 8px var(--accent-glow)}
.ainfo{flex:1;min-width:0}
.aname{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.aitem.active .aname{color:var(--accent)}
.aip{font-family:var(--mono);font-size:9px;color:var(--text-muted);margin-top:1px}
.asub{display:flex;align-items:center;gap:4px;margin-top:3px}
.acred{font-family:var(--mono);font-size:10px;color:var(--text-muted);background:var(--surface-3);border-radius:4px;padding:1px 5px}
.tdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.tdot.critical{background:var(--red);box-shadow:0 0 4px var(--red);animation:pulse 1.5s ease-in-out infinite}
.tdot.medium{background:var(--yellow)}.tdot.low{background:var(--accent)}
.tpill{font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:.05em;flex-shrink:0;display:flex;align-items:center;gap:4px}
.tpill.critical{background:var(--red-dim);color:var(--red);border:1px solid rgba(255,77,109,.25)}
.tpill.medium{background:var(--yellow-dim);color:var(--yellow);border:1px solid rgba(255,209,102,.25)}
.tpill.low{background:var(--accent-dim);color:var(--accent);border:1px solid rgba(0,245,196,.2)}

/* REPORT PANEL */
.rbody{padding:14px;display:flex;flex-direction:column;gap:0;overflow-y:auto;flex:1}
.rsec{margin-bottom:16px}
.rsec-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.rgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.rfield{display:flex;flex-direction:column;gap:3px}
.rlabel{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);font-weight:600}
.rval{font-size:12px;font-weight:500;color:var(--text)}
.rval.mono{font-family:var(--mono)}
.rval.breached{color:var(--red);font-weight:700}
.rval.blocked{color:var(--accent);font-weight:600}
.rfull{grid-column:1/-1}

/* BARS */
.bar-wrap{display:flex;flex-direction:column;gap:6px}
.bar-row{display:flex;align-items:center;gap:8px}
.bar-label{font-size:10px;color:var(--text-dim);width:130px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:5px;background:var(--surface-3);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--blue));border-radius:3px;transition:width .4s}
.bar-count{font-size:10px;color:var(--text-muted);font-family:var(--mono);width:20px;text-align:right}

/* CMD LIST */
.clist{display:flex;flex-direction:column;gap:3px;margin-top:6px}
.crow{display:flex;align-items:flex-start;gap:8px;padding:7px 10px;border-radius:var(--r-sm);font-family:var(--mono);font-size:11px;background:var(--surface-2)}
.ctime{color:var(--text-muted);flex-shrink:0;font-size:10px;min-width:60px}
.cprompt{color:var(--accent-mid);font-weight:700;flex-shrink:0}
.ctext{color:var(--text);word-break:break-all;flex:1}
.ctext.d{color:var(--red)}.ctext.w{color:var(--yellow)}.ctext.i{color:var(--accent)}

/* AI PANEL */
.ai-body{padding:14px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;flex:1}
.analyze-btn{width:100%;padding:10px 16px;border-radius:var(--r);
  background:linear-gradient(135deg,rgba(0,245,196,.15),rgba(0,201,158,.08));
  color:var(--accent);border:1px solid rgba(0,245,196,.3);
  font-size:12px;font-weight:700;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:7px}
.analyze-btn:hover{background:linear-gradient(135deg,rgba(0,245,196,.25),rgba(0,201,158,.15));box-shadow:0 0 20px var(--accent-glow);transform:translateY(-1px)}
.pgrid{display:flex;flex-direction:column;gap:10px}
.pfield{display:flex;flex-direction:column;gap:4px}
.plabel{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);font-weight:600}
.pval{font-size:12px;color:var(--text);line-height:1.4}
.skill-pill{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;display:inline-block}
.sk-low{background:rgba(74,222,128,.12);color:#4ade80;border:1px solid rgba(74,222,128,.2)}
.sk-med{background:var(--yellow-dim);color:var(--yellow);border:1px solid rgba(255,209,102,.2)}
.sk-high{background:var(--orange-dim);color:var(--orange);border:1px solid rgba(255,140,66,.25)}
.sk-nation{background:var(--red-dim);color:var(--red);border:1px solid rgba(255,77,109,.25)}
.tools-list{display:flex;flex-wrap:wrap;gap:4px;margin-top:2px}
.tool-chip{font-size:10px;padding:2px 8px;border-radius:5px;background:var(--surface-3);border:1px solid var(--border-hi);color:var(--text-dim);font-family:var(--mono)}
.psummary{font-size:11px;color:var(--text-dim);line-height:1.65;background:var(--surface-3);border-radius:var(--r-sm);padding:8px 10px;border-left:2px solid var(--accent-mid)}
.ai-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:8px;color:var(--text-muted);font-size:12px}

/* TIMELINE */
.tl-panel{background:var(--surface);grid-column:1/-1;display:flex;flex-direction:column;overflow:hidden;border-top:1px solid var(--border)}
.tl-body{overflow-x:auto;overflow-y:hidden;padding:16px 20px;flex:1}
.tl-track{display:flex;align-items:flex-start;gap:0;min-width:max-content;position:relative;padding-top:24px}
.tl-track::before{content:'';position:absolute;top:33px;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent-dim),var(--border),transparent)}
.tl-card{display:flex;flex-direction:column;align-items:center;min-width:120px;max-width:150px;padding:0 8px;position:relative}
.tl-node{width:18px;height:18px;border-radius:50%;border:2px solid var(--border-hi);background:var(--surface);display:flex;align-items:center;justify-content:center;position:relative;z-index:1}
.tl-inner{width:6px;height:6px;border-radius:50%}
.tl-cmd .tl-node{border-color:var(--accent)}.tl-cmd .tl-inner{background:var(--accent);box-shadow:0 0 4px var(--accent)}
.tl-login .tl-node{border-color:var(--yellow)}.tl-login .tl-inner{background:var(--yellow);box-shadow:0 0 4px var(--yellow)}
.tl-http .tl-node{border-color:var(--purple)}.tl-http .tl-inner{background:var(--purple);box-shadow:0 0 4px var(--purple)}
.tl-cb{margin-top:10px;background:var(--surface-2);border:1px solid var(--border-hi);border-radius:var(--r-sm);padding:6px 8px;width:100%}
.tl-time{font-size:9px;font-family:var(--mono);color:var(--text-muted);margin-bottom:2px}
.tl-txt{font-size:10px;font-weight:500;color:var(--text);word-break:break-word;line-height:1.3}
.tl-tag{display:inline-block;font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:1px 5px;border-radius:3px;margin-top:4px}
.tl-cmd .tl-tag{background:rgba(0,245,196,.12);color:var(--accent)}
.tl-login .tl-tag{background:var(--yellow-dim);color:var(--yellow)}
.tl-http .tl-tag{background:var(--purple-dim);color:var(--purple)}

/* REPORT FLAG */
.rflag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px}
.rflag.red{background:var(--red-dim);color:var(--red)}
.rflag.orange{background:var(--orange-dim);color:var(--orange)}

/* EMPTY */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:8px}
.empty svg{width:28px;height:28px;color:var(--text-muted);opacity:.4}
.empty-title{font-size:13px;color:var(--text-dim);font-weight:600}
.empty-sub{font-size:11px;color:var(--text-muted);text-align:center}

/* REFRESH BAR */
.rbar{position:fixed;top:106px;left:0;right:0;z-index:20;height:2px;background:var(--surface-2)}
.rbar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--blue));transition:width .5s linear}
</style>
</head>
<body>
<div id="app">
  <!-- TOPBAR -->
  <header class="topbar">
    <div class="tl">
      <div class="logo">
        <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg></div>
        MirrorTrap
      </div>
      <div class="live-badge"><div class="live-dot"></div>LIVE</div>
    </div>
    <div class="tr">
      <div class="ts"><div class="ts-label">Last Refresh</div><div class="ts-val" id="last-refresh">—</div></div>
      <div class="tdiv"></div>
      <div class="ts"><div class="ts-label">Auto-refresh</div><div class="ts-val">30s</div></div>
      <div class="tdiv"></div>
      <button class="gh-btn" onclick="window.open('https://github.com/Shrak-24/honeypot','_blank')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
        GitHub
      </button>
    </div>
  </header>

  <!-- STATS BAR -->
  <div class="stats-bar">
    <div class="stat-card"><div class="si t"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div><div class="sinfo"><div class="slabel">Sessions</div><div class="snum t" id="s-sessions">10</div></div></div>
    <div class="stat-card"><div class="si r"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div><div class="sinfo"><div class="slabel">Total Attacks</div><div class="snum r" id="s-attacks">33</div></div></div>
    <div class="stat-card"><div class="si y"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></div><div class="sinfo"><div class="slabel">Unique IPs</div><div class="snum y" id="s-ips">10</div></div></div>
    <div class="stat-card"><div class="si p"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div><div class="sinfo"><div class="slabel">Auth Breaches</div><div class="snum p" id="s-breach">4</div></div></div>
    <div class="stat-card"><div class="si b"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg></div><div class="sinfo"><div class="slabel">Top Attack</div><div class="snum b small">env exposure</div></div></div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="ph">
        <div class="pt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>Attackers</div>
        <span class="badge" id="atk-count">10</span>
      </div>
      <div class="sw">
        <div class="si-search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>
        <input id="search" placeholder="Search attacker, IP or username…" oninput="filterList()"/>
      </div>
      <div class="pb"><ul class="alist" id="alist"></ul></div>
    </div>

    <!-- CONTENT -->
    <div class="content">
      <!-- REPORT -->
      <div class="panel" style="grid-column:1;grid-row:1">
        <div class="ph">
          <div class="pt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Attacker Report</div>
          <span id="report-pill" class="tpill low">LOW</span>
        </div>
        <div class="rbody" id="report-body"></div>
      </div>

      <!-- AI PROFILE -->

function level(a){ return a.breach?'critical':(a.user?'medium':'low') }

// ── Build Attacker List ───────────────────────────────────────────────────────
function buildList(filter=''){
  const ul = document.getElementById('alist');
  ul.innerHTML='';
  ATTACKERS.forEach(a=>{
    const q = filter.toLowerCase();
    if(q && !a.label.toLowerCase().includes(q) && !a.ip.includes(q) && !a.user.toLowerCase().includes(q)) return;
    const lv = level(a);
    const li = document.createElement('li');
    li.className = `aitem${a===selected?' active':''}`;
    li.onclick = ()=>{ selected=a; buildList(document.getElementById('search').value); renderReport(); renderAI(); renderTimeline(); };
    li.innerHTML=`
      <div class="aavatar av-${lv}">${lv==='critical'?SKULL:USER}</div>
      <div class="ainfo">
        <div class="aname">${a.label}</div>
        <div class="aip">${a.ip}</div>
        <div class="asub"><div class="tdot ${lv}"></div><span class="acred">${a.user} / ${a.pass}</span></div>
      </div>
      <span class="tpill ${lv}">${lv==='critical'?'✓ AUTH':lv}</span>`;
    ul.appendChild(li);
  });
}

function filterList(){ buildList(document.getElementById('search').value) }

// ── Render Report ─────────────────────────────────────────────────────────────
function cmdClass(c){ if(/wget|curl|chmod|crontab|tmp|base64|eval|mkfifo|python|payload|ransom|exfil|mimikatz|psexec/.test(c)) return 'd'; if(/shadow|passwd|env|find|net group|iptables/.test(c)) return 'w'; if(/uname|whoami|hostname|ifconfig|ps aux|netstat|id|ss -|ip route|top/.test(c)) return 'i'; return '' }

function renderReport(){
  const a = selected;
  const lv = level(a);
  document.getElementById('report-pill').className='tpill '+lv;
  document.getElementById('report-pill').innerHTML=lv==='critical'?'✓ AUTH BREACH':lv.toUpperCase();

  // attack freq
  const freq={};
  a.attacks.forEach(t=>{ freq[t]=(freq[t]||0)+1 });
  const entries = Object.entries(freq).sort((x,y)=>y[1]-x[1]);
  const maxA = entries[0]?.[1]||1;
  const barsHtml = entries.map(([t,c])=>`
    <div class="bar-row">
      <div class="bar-label">${t.replace(/_/g,' ')}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${(c/maxA)*100}%"></div></div>
      <div class="bar-count">${c}</div>
    </div>`).join('');

  const cmdsHtml = a.cmds.map(c=>`
    <div class="crow">
      <span class="ctime">${c.t}</span>
      <span class="cprompt">$</span>
      <span class="ctext ${cmdClass(c.cmd)||c.cls}">${escHtml(c.cmd)}</span>
    </div>`).join('');

  const geoHtml = a.country?`
    <div class="rfield"><div class="rlabel">Location</div><div class="rval">${a.country}</div></div>
    <div class="rfield"><div class="rlabel">ISP / Org</div><div class="rval">${a.isp}</div></div>
    ${(a.proxy||a.hosting)?`<div class="rfield rfull"><div class="rlabel">Flags</div><div style="display:flex;gap:5px">
      ${a.proxy?'<span class="rflag red">PROXY / VPN</span>':''}
      ${a.hosting?'<span class="rflag orange">HOSTING / DC</span>':''}
    </div></div>`:''}
  `:'';

  document.getElementById('report-body').innerHTML=`
    <div class="rsec">
      <div class="rsec-title">Identity</div>
      <div class="rgrid">
        <div class="rfield rfull"><div class="rlabel">Attacker Label</div><div class="rval" style="font-size:15px;font-weight:700;color:var(--accent)">${a.label}</div></div>
        <div class="rfield"><div class="rlabel">IP Address</div><div class="rval mono">${a.ip}</div></div>
        ${geoHtml}
      </div>
    </div>
    <div class="rsec">
      <div class="rsec-title">Credentials Attempted</div>
      <div class="rgrid">
        <div class="rfield"><div class="rlabel">Username</div><div class="rval mono">${a.user||'—'}</div></div>
        <div class="rfield"><div class="rlabel">Password</div><div class="rval mono">${a.pass||'—'}</div></div>
        <div class="rfield rfull"><div class="rlabel">Auth Result</div><div class="rval ${a.breach?'breached':'blocked'}">${a.breach?'✗ BREACHED':'✓ Blocked'}</div></div>
      </div>
    </div>
    <div class="rsec">
      <div class="rsec-title">Session Info</div>
      <div class="rgrid">
        <div class="rfield"><div class="rlabel">Commands Run</div><div class="rval mono">${a.cmds.length}</div></div>
        <div class="rfield"><div class="rlabel">HTTP Attacks</div><div class="rval mono">${a.attacks.length}</div></div>
      </div>
    </div>
    ${entries.length?`<div class="rsec"><div class="rsec-title">Attack Distribution</div><div class="bar-wrap" style="margin-top:8px">${barsHtml}</div></div>`:''}
    ${a.cmds.length?`<div class="rsec"><div class="rsec-title">Captured Commands (${a.cmds.length})</div><div class="clist">${cmdsHtml}</div></div>`:''}
  `;
}

// ── Render AI ─────────────────────────────────────────────────────────────────
function skillClass(s){
  if(!s) return '';
  const l=s.toLowerCase();
  if(l.includes('nation')) return 'sk-nation';
  if(l==='high') return 'sk-high';
  if(l==='medium') return 'sk-med';
  return 'sk-low';
}

function renderAI(){
  const a=selected;
  const p=a.ai;
  if(!p){ document.getElementById('ai-body').innerHTML=`<div class="ai-placeholder"><div>No AI data</div></div>`; return; }
  const tools=p.tools.map(t=>`<span class="tool-chip">${t}</span>`).join('');
  document.getElementById('ai-body').innerHTML=`
    <div class="pgrid">
      <div class="pfield"><div class="plabel">Attacker Type</div><div class="pval">${p.type}</div></div>
      <div class="pfield"><div class="plabel">Skill Level</div><span class="skill-pill ${skillClass(p.skill)}">${p.skill}</span></div>
      <div class="pfield"><div class="plabel">Intent</div><div class="pval">${p.intent}</div></div>
      <div class="pfield"><div class="plabel">Tools / Techniques</div><div class="tools-list">${tools}</div></div>
      <div class="pfield"><div class="plabel">Summary</div><p class="psummary">${p.summary}</p></div>
    </div>`;
}

// ── Render Timeline ───────────────────────────────────────────────────────────
function renderTimeline(){
  const a=selected;
  const events=[];
  events.push({cls:'tl-login',t:a.cmds[0]?.t||'20:14:00',txt:'Session started',tag:'login'});
  a.cmds.forEach(c=>events.push({cls:'tl-cmd',t:c.t,txt:c.cmd.substring(0,40)+(c.cmd.length>40?'…':''),tag:'cmd'}));
  a.attacks.forEach((atk,i)=>events.push({cls:'tl-http',t:`20:${14+i}:30`,txt:atk.replace(/_/g,' '),tag:'http'}));
  events.push({cls:'tl-login',t:a.cmds[a.cmds.length-1]?.t||'20:15:00',txt:'Session ended',tag:'login'});
  events.sort((x,y)=>x.t.localeCompare(y.t));
  document.getElementById('tl-count').textContent=events.length;
  document.getElementById('tl-track').innerHTML=events.map(ev=>`
    <div class="tl-card ${ev.cls}">
      <div class="tl-node"><div class="tl-inner"></div></div>
      <div class="tl-cb">
        <div class="tl-time">${ev.t}</div>
        <div class="tl-txt">${escHtml(ev.txt)}</div>
        <span class="tl-tag">${ev.tag}</span>
      </div>
    </div>`).join('');
}

function escHtml(s){ const d=document.createElement('div');d.textContent=s;return d.innerHTML }

// ── Clock & Refresh Bar ───────────────────────────────────────────────────────
function updateClock(){
  document.getElementById('last-refresh').textContent=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

let pct=100;
setInterval(()=>{
  pct=Math.max(0,pct-100/60);
  document.getElementById('rbar').style.width=pct+'%';
  if(pct<=0){ pct=100; updateClock(); }
},500);

// ── Init ──────────────────────────────────────────────────────────────────────
buildList();
renderReport();
renderAI();
renderTimeline();
updateClock();
